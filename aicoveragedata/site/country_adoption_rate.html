<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Country Adoption Comparison</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #17202a;
        }
        .compare-card {
            margin: 24px;
            background: #ffffff;
            border: 1px solid #d8dee4;
            border-radius: 8px;
            padding: 16px;
        }
        h1 {
            margin: 0 0 14px;
            font-size: 22px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }
        label {
            display: grid;
            gap: 5px;
            color: #5b6670;
            font-size: 13px;
        }
        select {
            min-width: 180px;
            padding: 8px 10px;
            border: 1px solid #b7c2cc;
            border-radius: 6px;
            background: #ffffff;
            color: #17202a;
        }
        .chart {
            min-height: 240px;
            overflow-x: auto;
            padding-top: 10px;
            border-top: 1px solid #d8dee4;
        }
        .line-svg {
            width: 100%;
            min-width: 720px;
            height: auto;
            display: block;
        }
        .axis-label {
            fill: #5b6670;
            font-size: 11px;
        }
        .legend {
            display: flex;
            gap: 14px;
            margin-top: 12px;
            color: #5b6670;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .chip {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <section class="compare-card">
        <h1>Country Adoption Comparison</h1>
        <div class="controls">
            <label>First country<select id="first"></select></label>
            <label>Second country<select id="second"></select></label>
        </div>
        <div class="chart" id="chart"></div>
        <div class="legend" id="legend"></div>
    </section>
    <script>
        const years = [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032, 2033, 2034, 2035];
        const entities = ["Australia", "Brazil", "Canada", "China", "France", "Germany", "India", "Japan", "Netherlands", "Singapore", "South Korea", "Sweden", "UAE", "United Kingdom", "United States"];
        const values = {"Australia": [0.1758, 0.2207, 0.2515, 0.283, 0.3033, 0.3432, 0.3832, 0.4022, 0.4507, 0.4867, 0.5321, 0.5451, 0.5851, 0.6443, 0.6749, 0.6995, 0.7238, 0.7662, 0.7786, 0.8296, 0.8517], "Brazil": [0.165, 0.1841, 0.2168, 0.246, 0.2643, 0.3234, 0.3546, 0.397, 0.4252, 0.4566, 0.4853, 0.5257, 0.5356, 0.5815, 0.6316, 0.6492, 0.7097, 0.7281, 0.7656, 0.7881, 0.8217], "Canada": [0.1879, 0.2219, 0.2599, 0.2822, 0.3262, 0.3592, 0.39, 0.4128, 0.4504, 0.4969, 0.5286, 0.5853, 0.6083, 0.6258, 0.6775, 0.6934, 0.7322, 0.7658, 0.8018, 0.8401, 0.857], "China": [0.1896, 0.2215, 0.2474, 0.2805, 0.3144, 0.3514, 0.3921, 0.4262, 0.457, 0.4966, 0.5333, 0.5636, 0.6022, 0.624, 0.6691, 0.6986, 0.7348, 0.7729, 0.7972, 0.8386, 0.8562], "France": [0.1821, 0.207, 0.2359, 0.2735, 0.3176, 0.3427, 0.375, 0.4261, 0.4432, 0.4819, 0.5197, 0.5645, 0.5875, 0.6094, 0.6628, 0.6814, 0.7338, 0.7568, 0.7927, 0.8201, 0.8465], "Germany": [0.1928, 0.2115, 0.2585, 0.2808, 0.3169, 0.3448, 0.3884, 0.4249, 0.4531, 0.4935, 0.5302, 0.5638, 0.5971, 0.6298, 0.6649, 0.7015, 0.7393, 0.7592, 0.8012, 0.8299, 0.8626], "India": [0.1824, 0.213, 0.2354, 0.2704, 0.3021, 0.3278, 0.3648, 0.4127, 0.4293, 0.4669, 0.5087, 0.5511, 0.5758, 0.6151, 0.6443, 0.6895, 0.7105, 0.744, 0.7839, 0.8215, 0.844], "Japan": [0.1764, 0.2108, 0.2444, 0.2731, 0.3075, 0.3478, 0.3876, 0.4175, 0.4525, 0.4772, 0.516, 0.5395, 0.5893, 0.6197, 0.6529, 0.6936, 0.7333, 0.7642, 0.7928, 0.8215, 0.8523], "Netherlands": [0.174, 0.1982, 0.2255, 0.272, 0.3207, 0.3501, 0.3643, 0.4008, 0.4521, 0.4858, 0.5024, 0.5684, 0.5759, 0.6205, 0.6715, 0.6933, 0.7277, 0.7668, 0.8041, 0.834, 0.8472], "Singapore": [0.2162, 0.2334, 0.2691, 0.3064, 0.3196, 0.3609, 0.4016, 0.4401, 0.4504, 0.5169, 0.5425, 0.5738, 0.6238, 0.646, 0.6645, 0.698, 0.731, 0.7862, 0.8227, 0.8541, 0.8652], "South Korea": [0.1731, 0.2186, 0.2447, 0.2784, 0.3073, 0.3451, 0.3843, 0.4205, 0.4445, 0.4872, 0.5066, 0.55, 0.5893, 0.6238, 0.6689, 0.692, 0.7148, 0.75, 0.7907, 0.8262, 0.8575], "Sweden": [0.1847, 0.223, 0.2488, 0.3058, 0.3197, 0.3592, 0.3878, 0.4177, 0.4328, 0.4917, 0.5463, 0.5781, 0.5995, 0.6478, 0.6648, 0.6978, 0.751, 0.7776, 0.808, 0.8239, 0.8332], "UAE": [0.1934, 0.196, 0.2309, 0.2414, 0.2775, 0.319, 0.3351, 0.4031, 0.4327, 0.4824, 0.4834, 0.5097, 0.5732, 0.6266, 0.6317, 0.6587, 0.7081, 0.7407, 0.7559, 0.7958, 0.8227], "United Kingdom": [0.2018, 0.2273, 0.2532, 0.2929, 0.3281, 0.3655, 0.3994, 0.4276, 0.4627, 0.5047, 0.5429, 0.574, 0.6043, 0.6519, 0.6693, 0.7044, 0.7495, 0.7801, 0.8094, 0.8367, 0.8678], "United States": [0.2079, 0.2336, 0.2709, 0.3166, 0.3458, 0.3729, 0.4121, 0.4475, 0.4769, 0.5164, 0.5457, 0.588, 0.6143, 0.6503, 0.6875, 0.7242, 0.7575, 0.7856, 0.8236, 0.8486, 0.8739]};
        const firstSelect = document.getElementById("first");
        const secondSelect = document.getElementById("second");
        const chart = document.getElementById("chart");
        const legend = document.getElementById("legend");

        entities.forEach((entity) => {
            firstSelect.add(new Option(entity, entity));
            secondSelect.add(new Option(entity, entity));
        });
        secondSelect.selectedIndex = Math.min(1, entities.length - 1);

        function render() {
            const first = firstSelect.value;
            const second = secondSelect.value;
            const allValues = [...values[first], ...values[second]].filter((value) => value !== null);
            const maxValue = Math.max(...allValues, 1);
            const width = Math.max(720, years.length * 62);
            const height = 260;
            const left = 42;
            const right = 18;
            const top = 18;
            const bottom = 36;
            const plotWidth = width - left - right;
            const plotHeight = height - top - bottom;

            function pointsFor(entity) {
                return values[entity].map((value, index) => {
                    const x = left + (index / Math.max(years.length - 1, 1)) * plotWidth;
                    const y = top + plotHeight - (((value ?? 0) / maxValue) * plotHeight);
                    return { x, y, value: value ?? 0, year: years[index] };
                });
            }

            function pathFor(points) {
                return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`).join(" ");
            }

            function dotsFor(points, color, entity) {
                return points.map((point) => `
                    <circle cx="${point.x}" cy="${point.y}" r="5.5" fill="${color}">
                        <title>${entity} ${point.year}: ${point.value.toFixed(3)}</title>
                    </circle>
                `).join("");
            }

            const firstPoints = pointsFor(first);
            const secondPoints = pointsFor(second);
            const yearLabels = years.map((year, index) => {
                const x = left + (index / Math.max(years.length - 1, 1)) * plotWidth;
                return `<text x="${x}" y="${height - 10}" text-anchor="middle" class="axis-label">${year}</text>`;
            }).join("");

            chart.innerHTML = `
                <svg class="line-svg" viewBox="0 0 ${width} ${height}" role="img">
                    <line x1="${left}" y1="${top}" x2="${left}" y2="${height - bottom}" stroke="#b7c2cc" />
                    <line x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}" stroke="#b7c2cc" />
                    <text x="6" y="${top + 8}" class="axis-label">${maxValue.toFixed(2)}</text>
                    <text x="12" y="${height - bottom}" class="axis-label">0</text>
                    <path d="${pathFor(firstPoints)}" fill="none" stroke="#2f80ed" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="${pathFor(secondPoints)}" fill="none" stroke="#f2994a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                    ${dotsFor(firstPoints, "#2f80ed", first)}
                    ${dotsFor(secondPoints, "#f2994a", second)}
                    ${yearLabels}
                </svg>
            `;

            legend.innerHTML = `
                <span><span class="chip" style="background:#2f80ed"></span>${first}</span>
                <span><span class="chip" style="background:#f2994a"></span>${second}</span>
            `;
        }

        firstSelect.addEventListener("change", render);
        secondSelect.addEventListener("change", render);
        render();
    </script>
</body>
</html>
