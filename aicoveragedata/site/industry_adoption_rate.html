<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Industry Adoption Comparison</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #17202a;
        }
        .compare-card {
            margin: 24px;
            background: #ffffff;
            border: 1px solid #d8dee4;
            border-radius: 8px;
            padding: 16px;
        }
        h1 {
            margin: 0 0 14px;
            font-size: 22px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 14px;
        }
        label {
            display: grid;
            gap: 5px;
            color: #5b6670;
            font-size: 13px;
        }
        select {
            min-width: 180px;
            padding: 8px 10px;
            border: 1px solid #b7c2cc;
            border-radius: 6px;
            background: #ffffff;
            color: #17202a;
        }
        .chart {
            min-height: 240px;
            overflow-x: auto;
            padding-top: 10px;
            border-top: 1px solid #d8dee4;
        }
        .line-svg {
            width: 100%;
            min-width: 720px;
            height: auto;
            display: block;
        }
        .axis-label {
            fill: #5b6670;
            font-size: 11px;
        }
        .legend {
            display: flex;
            gap: 14px;
            margin-top: 12px;
            color: #5b6670;
        }
        .legend span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .chip {
            width: 12px;
            height: 12px;
            border-radius: 999px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <section class="compare-card">
        <h1>Industry Adoption Comparison</h1>
        <div class="controls">
            <label>First industry<select id="first"></select></label>
            <label>Second industry<select id="second"></select></label>
        </div>
        <div class="chart" id="chart"></div>
        <div class="legend" id="legend"></div>
    </section>
    <script>
        const years = [2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024, 2025, 2026, 2027, 2028, 2029, 2030, 2031, 2032, 2033, 2034, 2035];
        const entities = ["Agriculture", "Education", "Energy", "Financial Services", "Healthcare", "Logistics", "Manufacturing", "Retail", "Technology", "Telecom"];
        const values = {"Agriculture": [0.1831, 0.227, 0.2461, 0.2907, 0.3345, 0.3647, 0.399, 0.4221, 0.4533, 0.4917, 0.5376, 0.5694, 0.5877, 0.6276, 0.6701, 0.7028, 0.7359, 0.7679, 0.8076, 0.8519, 0.855], "Education": [0.1941, 0.2181, 0.2393, 0.2838, 0.3193, 0.3634, 0.3911, 0.4303, 0.4529, 0.4849, 0.5334, 0.5621, 0.6031, 0.6316, 0.6613, 0.701, 0.7428, 0.7612, 0.7916, 0.8381, 0.8648], "Energy": [0.2001, 0.2205, 0.25, 0.2895, 0.3196, 0.3488, 0.3835, 0.4364, 0.4515, 0.4913, 0.5262, 0.5639, 0.602, 0.6367, 0.676, 0.7064, 0.7404, 0.7709, 0.8038, 0.8312, 0.8651], "Financial Services": [0.1952, 0.223, 0.2543, 0.287, 0.3248, 0.352, 0.3942, 0.4296, 0.451, 0.4949, 0.5296, 0.5688, 0.5974, 0.6302, 0.6639, 0.7008, 0.735, 0.7646, 0.8059, 0.832, 0.8545], "Healthcare": [0.191, 0.2126, 0.2557, 0.289, 0.3143, 0.3502, 0.3856, 0.4248, 0.457, 0.4992, 0.5237, 0.5687, 0.6003, 0.6295, 0.6738, 0.6972, 0.7433, 0.7668, 0.8007, 0.8356, 0.8598], "Logistics": [0.1952, 0.2164, 0.251, 0.2873, 0.3235, 0.3562, 0.3915, 0.4258, 0.4573, 0.4919, 0.5319, 0.5577, 0.5984, 0.6319, 0.6698, 0.7053, 0.7322, 0.7701, 0.8196, 0.8329, 0.853], "Manufacturing": [0.1858, 0.2216, 0.2463, 0.2872, 0.3242, 0.3528, 0.3854, 0.4254, 0.4572, 0.4954, 0.5287, 0.5681, 0.5971, 0.6274, 0.6647, 0.6981, 0.7418, 0.7742, 0.7968, 0.8315, 0.8602], "Retail": [0.1941, 0.2207, 0.2586, 0.2868, 0.316, 0.3534, 0.3936, 0.4296, 0.4615, 0.4947, 0.5313, 0.5623, 0.6027, 0.6345, 0.6754, 0.6995, 0.7269, 0.7704, 0.7972, 0.8398, 0.8605], "Technology": [0.1947, 0.2206, 0.2519, 0.2903, 0.3162, 0.3538, 0.3957, 0.4227, 0.4579, 0.4978, 0.5312, 0.5665, 0.5995, 0.6286, 0.6708, 0.7016, 0.7401, 0.7664, 0.799, 0.8294, 0.8546], "Telecom": [0.1763, 0.2216, 0.2634, 0.2853, 0.3195, 0.3567, 0.3898, 0.4234, 0.4553, 0.495, 0.5265, 0.5746, 0.5844, 0.64, 0.6615, 0.699, 0.7355, 0.7746, 0.8031, 0.8268, 0.8559]};
        const firstSelect = document.getElementById("first");
        const secondSelect = document.getElementById("second");
        const chart = document.getElementById("chart");
        const legend = document.getElementById("legend");

        entities.forEach((entity) => {
            firstSelect.add(new Option(entity, entity));
            secondSelect.add(new Option(entity, entity));
        });
        secondSelect.selectedIndex = Math.min(1, entities.length - 1);

        function render() {
            const first = firstSelect.value;
            const second = secondSelect.value;
            const allValues = [...values[first], ...values[second]].filter((value) => value !== null);
            const maxValue = Math.max(...allValues, 1);
            const width = Math.max(720, years.length * 62);
            const height = 260;
            const left = 42;
            const right = 18;
            const top = 18;
            const bottom = 36;
            const plotWidth = width - left - right;
            const plotHeight = height - top - bottom;

            function pointsFor(entity) {
                return values[entity].map((value, index) => {
                    const x = left + (index / Math.max(years.length - 1, 1)) * plotWidth;
                    const y = top + plotHeight - (((value ?? 0) / maxValue) * plotHeight);
                    return { x, y, value: value ?? 0, year: years[index] };
                });
            }

            function pathFor(points) {
                return points.map((point, index) => `${index === 0 ? "M" : "L"} ${point.x} ${point.y}`).join(" ");
            }

            function dotsFor(points, color, entity) {
                return points.map((point) => `
                    <circle cx="${point.x}" cy="${point.y}" r="5.5" fill="${color}">
                        <title>${entity} ${point.year}: ${point.value.toFixed(3)}</title>
                    </circle>
                `).join("");
            }

            const firstPoints = pointsFor(first);
            const secondPoints = pointsFor(second);
            const yearLabels = years.map((year, index) => {
                const x = left + (index / Math.max(years.length - 1, 1)) * plotWidth;
                return `<text x="${x}" y="${height - 10}" text-anchor="middle" class="axis-label">${year}</text>`;
            }).join("");

            chart.innerHTML = `
                <svg class="line-svg" viewBox="0 0 ${width} ${height}" role="img">
                    <line x1="${left}" y1="${top}" x2="${left}" y2="${height - bottom}" stroke="#b7c2cc" />
                    <line x1="${left}" y1="${height - bottom}" x2="${width - right}" y2="${height - bottom}" stroke="#b7c2cc" />
                    <text x="6" y="${top + 8}" class="axis-label">${maxValue.toFixed(2)}</text>
                    <text x="12" y="${height - bottom}" class="axis-label">0</text>
                    <path d="${pathFor(firstPoints)}" fill="none" stroke="#2f80ed" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="${pathFor(secondPoints)}" fill="none" stroke="#f2994a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" />
                    ${dotsFor(firstPoints, "#2f80ed", first)}
                    ${dotsFor(secondPoints, "#f2994a", second)}
                    ${yearLabels}
                </svg>
            `;

            legend.innerHTML = `
                <span><span class="chip" style="background:#2f80ed"></span>${first}</span>
                <span><span class="chip" style="background:#f2994a"></span>${second}</span>
            `;
        }

        firstSelect.addEventListener("change", render);
        secondSelect.addEventListener("change", render);
        render();
    </script>
</body>
</html>
