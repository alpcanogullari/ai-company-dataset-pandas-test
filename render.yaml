services:
  - type: web
    name: ai-coverage-dashboard
    env: python
    buildCommand: pip install -r requirements.txt && python -m aicoveragedata.app.dashboard
    startCommand: HOST=0.0.0.0 python -m aicoveragedata.app.dashboard_server
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_REASONING_EFFORT
        value: low
      - key: OPENAI_TEXT_VERBOSITY
        value: low
      - key: AGENT_USE_DSPY
        value: "true"
      - key: AGENT_DSPY_FALLBACK
        value: "true"
      - key: AGENT_CHAT_HISTORY_PATH
        value: /tmp/ai_coverage_chat_history.json
      - key: AGENT_ALLOWED_ORIGINS
        value: "*"
